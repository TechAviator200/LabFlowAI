services:
  - type: web
    name: labflow-ai-api
    env: python
    region: oregon
    plan: free
    rootDir: labflowai/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: USE_MOCK_DB
        value: "false"
      - key: SUPABASE_STORAGE_BUCKET
        value: labflow-uploads
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://lab-flow-ai.vercel.app
      # Set these manually in the Render dashboard if you want persistent storage / AI parsing:
      # SUPABASE_URL        → your Supabase project URL
      # SUPABASE_SERVICE_KEY → your Supabase service-role key
      # LLM_API_KEY         → your OpenAI / Anthropic key
