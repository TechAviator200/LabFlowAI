services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: labflow-ai-api
    env: python
    region: oregon
    plan: free
    rootDir: labflowai/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: USE_MOCK_DB
        value: "false"
      # ── Set these in the Render dashboard ──────────────────────────────────
      - key: SUPABASE_URL
        sync: false          # paste your Supabase project URL
      - key: SUPABASE_SERVICE_KEY
        sync: false          # paste your Supabase service-role key (server only)
      - key: SUPABASE_STORAGE_BUCKET
        value: labflow-uploads
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_API_KEY
        sync: false          # paste your OpenAI / Anthropic API key
      - key: LLM_MODEL
        value: gpt-4o
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      - key: CORS_ORIGINS
        sync: false          # e.g. https://labflow-ai.vercel.app
